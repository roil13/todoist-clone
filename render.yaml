# Render blueprint. In Render: New → Blueprint → pick the roil13/todoist-clone
# repo. It reads this file; you'll be prompted for the three `sync: false`
# secrets (Turso URL/token + AUTH_SECRET).
services:
  - type: web
    name: todoist-clone
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_SECRET
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
